<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TapTap Analyzer</title>
</head>

<body>
    <h2>TapTap 游戏分析工具</h2>

    <input id="game" placeholder="输入游戏名称或ID">
    <button onclick="run()">开始分析</button>

    <pre id="out"></pre>

    <script>
        let taskId = null;

        async function run() {
            const game = document.getElementById("game").value;

            document.getElementById("out").innerText = "启动中...";

            const res = await fetch("/analyze", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    game_name: game
                })
            });

            const data = await res.json();

            if (data.error) {
                document.getElementById("out").innerText =
                    "错误: " + data.error;
                return;
            }

            taskId = data.task_id;

            poll();
        }

        async function poll() {
            const res = await fetch("/progress/" + taskId);
            const data = await res.json();

            document.getElementById("out").innerText =
                JSON.stringify(data, null, 2);

            if (data.status === "running") {
                setTimeout(poll, 2000);
            }
        }
    </script>
</body>
</html>
